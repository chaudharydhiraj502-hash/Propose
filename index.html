<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>
<style>
    body {
        text-align: center;
        font-family: Arial;
        background: pink;
    }

    h1 {
        margin-top: 100px;
        font-size: 30px;
    }

    .btn {
        padding: 10px 20px;
        font-size: 18px;
        border: none;
        border-radius: 10px;
        margin: 20px;
        cursor: pointer;
    }

    #yes {
        background: green;
        color: white;
    }

    #no {
        background: red;
        color: white;
        position: absolute;
    }
</style>
</head>

<body>

<h1>Will you be mine? ❤️</h1>

<button id="yes" class="btn" onclick="yesClicked()">Yes 💖</button>
<button id="no" class="btn">No 😢</button>

<script>
    const noBtn = document.getElementById("no");

    noBtn.addEventListener("mouseover", () => {
        const x = Math.random() * window.innerWidth;
        const y = Math.random() * window.innerHeight;

        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";
    });

    function yesClicked() {
        document.body.innerHTML = "<h1>I Love You ❤️🥰</h1>";
    }
</script>

</body>
</html>
